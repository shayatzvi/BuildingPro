<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - Property Management</title>
    <!-- Bootstrap 3 -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body { padding-top: 70px; }
        .detail-panel { display: none; }
        .page-header { margin-top: 0; }
        .form-field-row { display: flex; align-items: center; margin-bottom: 10px; }
        .form-field-row input { margin-right: 10px; }
        .form-field-row .btn { flex-shrink: 0; }
        .nav-tabs-alt { border-bottom: none; }
        .nav-tabs-alt > li > a { border-radius: 4px 4px 0 0; border: 1px solid #ddd; border-bottom: none; }
        .nav-tabs-alt > li.active > a, .nav-tabs-alt > li.active > a:hover, .nav-tabs-alt > li.active > a:focus { border-color: #ddd; border-bottom: 1px solid #fff; position: relative; top: 1px; background-color: #fff; }
        .tab-content-alt { border: 1px solid #ddd; padding: 15px; border-top: none; }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-default navbar-fixed-top">
        <div class="container-fluid">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar-collapse" aria-expanded="false">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="#">PropSys</a>
            </div>
            <div class="collapse navbar-collapse" id="navbar-collapse">
                <ul class="nav navbar-nav">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="properties.html">Properties</a></li>
                    <li><a href="tenants.html">Tenants</a></li>
                    <li><a href="maintenance.html">Maintenance</a></li>
                    
                    <li class="active"><a href="forms.html">Forms</a></li>
                    <li><a href="billing.html">Billing</a></li>
                    <li><a href="admin.html">Admin</a></li>
                </ul>
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="#"><span id="user-email"></span></a></li>
                    <li><a href="#" id="logout-button">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Master View -->
            <div class="col-md-12 master-view">
                <div class="page-header">
                    <div class="pull-right">
                        <button id="add-form-btn" class="btn btn-primary">
                            <span class="glyphicon glyphicon-plus"></span> Create Form
                        </button>
                    </div>
                    <h1>Forms</h1>
                </div>
                <div class="panel panel-default">
                    <div class="panel-body">
                        <table class="table table-hover">
                            <thead><tr><th>Form Title</th><th>Submissions</th><th>Created</th></tr></thead>
                            <tbody id="forms-list"></tbody>
                        </table>
                        <div id="empty-forms-state" class="text-center" style="display: none; padding: 2rem;">
                            <span class="glyphicon glyphicon-list-alt" style="font-size: 3rem;"></span>
                            <p>No forms created yet.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Detail Panel -->
            <div class="col-md-5 detail-panel" id="form-detail-panel">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <button type="button" id="close-detail-panel" class="close" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                        <h3 class="panel-title" id="detail-form-title">New Form</h3>
                    </div>
                    <div class="panel-body">
                        <!-- Tabs -->
                        <ul class="nav nav-tabs nav-tabs-alt" role="tablist">
                            <li role="presentation" class="active"><a href="#editor" aria-controls="editor" role="tab" data-toggle="tab">Editor</a></li>
                            <li role="presentation"><a href="#submissions" aria-controls="submissions" role="tab" data-toggle="tab">Submissions</a></li>
                        </ul>
                        <!-- Tab Panes -->
                        <div class="tab-content tab-content-alt">
                            <div role="tabpanel" class="tab-pane active" id="editor">
                                <form id="form-editor">
                                    <input type="hidden" id="form-id">
                                    <div class="form-group"><label for="form-title">Form Title</label><input type="text" id="form-title" class="form-control" required></div>
                                    <hr>
                                    <h4>Form Fields <button type="button" id="add-field-btn" class="btn btn-xs btn-default pull-right">Add Field</button></h4>
                                    <div id="form-fields-container"></div>
                                    <hr>
                                    <div class="form-group" id="form-link-container" style="display: none;">
                                        <label>Public Form Link</label>
                                        <div class="input-group">
                                            <input type="text" id="form-public-link" class="form-control" readonly>
                                            <span class="input-group-btn"><button class="btn btn-default" type="button" id="copy-link-btn">Copy</button></span>
                                        </div>
                                    </div>
                                </form>
                            </div>
                            <div role="tabpanel" class="tab-pane" id="submissions">
                                <div id="submissions-container"></div>
                            </div>
                        </div>
                    </div>
                    <div class="panel-footer">
                        <button id="delete-form-btn" class="btn btn-danger">Delete Form</button>
                        <button type="submit" form="form-editor" class="btn btn-primary pull-right">Save Form</button>
                        <div class="clearfix"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="main.js"></script>
    <script src="forms.js"></script>
</body>
</html>
