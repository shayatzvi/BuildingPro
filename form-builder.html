<!DOCTYPE html>
<html lang="en" class="gr__getbootstrap_com">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Builder - PropSys</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body { padding-top: 70px; }
        .field-row {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            background-color: #f9f9f9;
            position: relative;
        }
        .field-row .remove-field-btn {
            position: absolute;
            top: 10px;
            right: 10px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-default navbar-fixed-top">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="dashboard.html">PropSys</a>
            </div>
            <div id="navbar" class="collapse navbar-collapse">
                <ul class="nav navbar-nav nav-links">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li class="active"><a href="forms-list.html">Forms</a></li>
                </ul>
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="#" id="logout-button">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container-fluid">
        <div class="page-header">
            <h1 id="builder-title">Create Form</h1>
        </div>

        <form id="form-creator">
            <div class="form-group">
                <label for="form-title">Form Title</label>
                <input type="text" id="form-title" class="form-control" placeholder="e.g., New Tenant Application" required>
            </div>
            <div class="form-group">
                <label for="form-description">Description</label>
                <textarea id="form-description" class="form-control" rows="3" placeholder="A short description of the form's purpose."></textarea>
            </div>
            <hr>
            <h3>Form Fields</h3>
            <div id="fields-container"></div>
            <button type="button" id="add-field-btn" class="btn btn-default"><span class="glyphicon glyphicon-plus"></span> Add Field</button>
            <hr>
            <button type="submit" class="btn btn-primary btn-lg">Save Form</button>
            <a href="forms-list.html" class="btn btn-default btn-lg">Cancel</a>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="main.js"></script>
    <script src="form-builder.js"></script>

</body></html>
