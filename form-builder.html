<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Builder - PropSys</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body { padding-top: 70px; }
        .field-options {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .field-row {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-default navbar-fixed-top">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="#">PropSys</a>
            </div>
            <div class="collapse navbar-collapse">
                <ul class="nav navbar-nav">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="properties.html">Properties</a></li>
                    <li><a href="tenants.html">Tenants</a></li>
                    <li><a href="maintenance.html">Maintenance</a></li>
                    <li><a href="billing.html">Billing</a></li>
                    <li class="active"><a href="form-builder.html">Form Builder</a></li>
                    <li><a href="admin.html">Admin</a></li>
                </ul>
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="#" id="logout-button">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <a href="forms-list.html" class="btn btn-default pull-right" style="margin-top: 20px;">
                <span class="glyphicon glyphicon-chevron-left"></span> Back to Forms
            </a>
            <h1>Create Form</h1>
        </div>

        <div id="form-link-section" class="alert alert-success" style="display: none;">
            <strong>Success!</strong> Your form has been saved.
            <a href="forms-list.html" class="alert-link">Return to the forms list</a> to see all your forms.
            <br>
            <a href="#" id="public-form-link" target="_blank"></a>
            <button id="copy-link-btn" class="btn btn-xs btn-primary pull-right">Copy Link</button>
        </div>

        <form id="form-creator">
            <div class="form-group">
                <label for="form-title">Form Title</label>
                <input type="text" id="form-title" class="form-control" placeholder="e.g., New Tenant Application" required>
            </div>
            <div class="form-group">
                <label for="form-description">Description</label>
                <textarea id="form-description" class="form-control" rows="3" placeholder="A short description of the form's purpose."></textarea>
            </div>

            <hr>
            <h3>Form Fields
                <button type="button" id="add-field-btn" class="btn btn-sm btn-default pull-right">
                    <span class="glyphicon glyphicon-plus"></span> Add Field
                </button>
            </h3>
            <div id="fields-container">
                <!-- Dynamic fields will be added here -->
            </div>
            <hr>
            <button type="submit" class="btn btn-primary btn-lg">Save Form</button>
        </form>


<!--

-->
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="form-builder.js"></script>

</body>
</html>
