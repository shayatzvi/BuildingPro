<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice</title>
    <!-- Bootstrap 3 -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .invoice-container {
            max-width: 800px;
            margin: 30px auto;
            background-color: #fff;
            padding: 40px;
            border: 1px solid #ddd;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        .invoice-header {
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
            margin-bottom: 30px;
        }
        .print-button-container {
            text-align: center;
            margin-bottom: 20px;
        }

        @media print {
            body {
                background-color: #fff;
            }
            .print-button-container {
                display: none;
            }
            .invoice-container {
                margin: 0;
                padding: 0;
                border: none;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="print-button-container">
            <button class="btn btn-primary btn-lg" onclick="window.print()">
                <span class="glyphicon glyphicon-print"></span> Print Invoice
            </button>
        </div>

        <div class="invoice-container">
            <div class="invoice-header row">
                <div class="col-xs-7">
                    <div id="company-profile">
                        <h3 id="company-name">Your Company</h3>
                        <address id="company-address"></address>
                    </div>
                </div>
                <div class="col-xs-5 text-right">
                    <h2>INVOICE</h2>
                    <h4>INVOICE #<span id="detail-invoice-id"></span></h4>
                    <p><strong>Date Issued:</strong> <span id="detail-issue-date"></span></p>
                    <p><strong>Due Date:</strong> <span id="detail-due-date"></span></p>
                </div>
            </div>

            <div class="row" style="margin-bottom: 30px;">
                <div class="col-xs-6">
                    <h4>INVOICE TO:</h4>
                    <p id="detail-tenant-name"></p>
                    <p id="detail-property-address"></p>
                    <p><small>Billing ID: <span id="detail-tenant-billing-id"></span></small></p>
                </div>
            </div>

            <table id="detail-line-items" class="table table-striped">
                <!-- Line items will be loaded here -->
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const invoiceId = urlParams.get('id');
            const companyId = urlParams.get('company');

            if (!invoiceId || !companyId) {
                document.body.innerHTML = '<div class="alert alert-danger">Error: Missing invoice or company information.</div>';
                return;
            }

            // Load company profile
            db.collection('users').doc(companyId).collection('profile').doc('info').get().then(profileDoc => {
                if (profileDoc.exists) {
                    const profile = profileDoc.data();
                    document.getElementById('company-name').textContent = profile.companyName || 'Your Company';
                    document.getElementById('company-address').innerHTML = profile.companyAddress ? profile.companyAddress.replace(/\n/g, '<br>') : '';
                }
            });

            db.collection('users').doc(companyId).collection('invoices').doc(invoiceId).get().then(doc => {
                if (doc.exists) {
                    const invoice = doc.data();
                    document.title = `Invoice #${doc.id.substring(0, 8).toUpperCase()}`;
                    document.getElementById('detail-invoice-id').textContent = doc.id.substring(0, 8).toUpperCase();
                    document.getElementById('detail-issue-date').textContent = invoice.createdAt.toDate().toLocaleDateString();
                    document.getElementById('detail-due-date').textContent = invoice.dueDate.toDate().toLocaleDateString();
                    document.getElementById('detail-tenant-name').textContent = invoice.tenantName;
                    document.getElementById('detail-property-address').innerHTML = invoice.propertyAddress; // Use innerHTML to render <br>
                    document.getElementById('detail-tenant-billing-id').textContent = invoice.tenantId;

                    let tableHtml = `<thead><tr><th>Description</th><th class="text-right">Amount</th></tr></thead><tbody>`;
                    invoice.lineItems.forEach(item => {
                        tableHtml += `<tr><td>${item.description}</td><td class="text-right">$${item.amount.toFixed(2)}</td></tr>`;
                    });
                    tableHtml += `</tbody><tfoot><tr class="active"><td class="text-right"><strong>Total</strong></td><td class="text-right"><strong>$${invoice.totalAmount.toFixed(2)}</strong></td></tr></tfoot>`;
                    document.getElementById('detail-line-items').innerHTML = tableHtml;
                } else {
                    document.body.innerHTML = '<div class="alert alert-danger">Error: Invoice not found.</div>';
                }
            });
        });
    </script>

</body>
</html>
