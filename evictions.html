<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evictions - Property Management</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <!-- Select2 CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
    <style>
        body { padding-top: 70px; }
        .detail-panel { display: none; }
        .page-header { margin-top: 0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-default navbar-fixed-top">
        <div class="container-fluid">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar-collapse">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span><span class="icon-bar"></span><span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="#">PropSys</a>
            </div>
            <div class="collapse navbar-collapse" id="navbar-collapse">
                <ul class="nav navbar-nav">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="properties.html">Properties</a></li>
                    <li><a href="tenants.html">Tenants</a></li>
                    <li><a href="maintenance.html">Maintenance</a></li>
                    <li><a href="forms.html">Forms</a></li>
                    <li><a href="billing.html">Billing</a></li>
                    <li class="active"><a href="evictions.html">Evictions</a></li>
                    <li><a href="admin.html">Admin</a></li>
                </ul>
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="#"><span id="user-email"></span></a></li>
                    <li><a href="#" id="logout-button">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-12 master-view">
                <div class="page-header">
                    <div class="pull-right">
                        <button id="add-eviction-btn" class="btn btn-primary">
                            <span class="glyphicon glyphicon-plus"></span> Create Eviction
                        </button>
                    </div>
                    <h1>Evictions</h1>
                </div>
                <div class="panel panel-default">
                    <div class="panel-body">
                        <div class="row" style="margin-bottom: 15px;">
                            <div class="col-md-4 col-md-offset-8">
                                <div class="input-group">
                                    <span class="input-group-addon"><span class="glyphicon glyphicon-search"></span></span>
                                    <input type="text" id="eviction-search" class="form-control" placeholder="Search evictions...">
                                </div>
                            </div>
                        </div>
                        <table class="table table-hover">
                            <thead><tr><th>Tenant</th><th>Property</th><th>Date Issued</th><th>Termination Date</th></tr></thead>
                            <tbody id="evictions-list"></tbody>
                        </table>
                        <div id="empty-evictions-state" class="text-center" style="display: none; padding: 2rem;">
                            <span class="glyphicon glyphicon-file" style="font-size: 3rem;"></span>
                            <p>No evictions filed.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-5 detail-panel" id="eviction-detail-panel">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <button type="button" id="close-detail-panel" class="close">&times;</button>
                        <h3 class="panel-title" id="detail-title">New Eviction Notice</h3>
                    </div>
                    <div class="panel-body">
                        <form id="eviction-form">
                            <input type="hidden" id="eviction-id">
                            <div class="form-group">
                                <label for="eviction-tenant">Select Tenant</label>
                                <select id="eviction-tenant" class="form-control" required></select>
                            </div>
                            <div class="form-group"><label>Reason for Eviction</label><textarea id="eviction-reason" class="form-control" rows="3" required placeholder="e.g. Non-payment of rent, Lease violation"></textarea></div>
                            <div class="row">
                                <div class="col-sm-6">
                                    <div class="form-group"><label>Notice Date</label><input type="date" id="eviction-notice-date" class="form-control" required></div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="form-group"><label>Termination Date</label><input type="date" id="eviction-term-date" class="form-control" required></div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="panel-footer">
                        <button id="delete-eviction-btn" class="btn btn-danger">Delete Record</button>
                        <button id="print-notice-btn" class="btn btn-default" style="display: none;"><span class="glyphicon glyphicon-print"></span> Print Notice</button>
                        <button type="submit" form="eviction-form" class="btn btn-primary pull-right">Save Notice</button>
                        <div class="clearfix"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <!-- Select2 JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
    <script src="main.js"></script>
    <script src="evictions.js"></script>
</body>
</html>
