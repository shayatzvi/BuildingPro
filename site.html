<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements</title>
    <!-- Bootstrap 3 -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style> body { padding-top: 20px; } </style>
</head>
<body class="container">

    <div class="page-header">
        <h1>Announcements</h1>
    </div>

    <div id="public-announcements-list" class="list-group">
        <!-- Public announcements will be loaded here -->
    </div>

    <hr>

    <div class="row">
        <div class="col-md-6">
            <div class="panel panel-default">
                <div class="panel-heading">
                    <h3 class="panel-title">Portal Login</h3>
                </div>
                <div class="panel-body">
                    <p>Please sign in to access your account details and invoices.</p>
                    <form id="tenant-login-form" style="margin-top: 1.5rem;">
                        <input type="hidden" id="company-id">
                        <div class="form-group"><label for="tenant-login-email">Your Email Address</label><input type="email" id="tenant-login-email" class="form-control" required></div>
                        <div class="form-group"><label for="tenant-login-billing-id">Your Billing ID #</label><input type="text" id="tenant-login-billing-id" class="form-control" required></div>
                        <div id="tenant-login-error" class="alert alert-danger" style="display: none;"></div>
                        <button type="submit" class="btn btn-primary">Sign In</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="panel panel-default">
                <div class="panel-heading">
                    <h3 class="panel-title">Report a Maintenance Issue</h3>
                </div>
                <div class="panel-body">
                    <p>Report an issue directly to management. No login required.</p>
                    <form id="public-maintenance-form" style="margin-top: 1.5rem;">
                        <div class="form-group">
                            <label for="public-property">Property/Unit</label>
                            <select id="public-property" class="form-control" required>
                                <option value="">Loading units...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="public-issue">Issue Description</label>
                            <textarea id="public-issue" class="form-control" rows="3" required placeholder="Describe the problem (e.g., leaky faucet in the kitchen)"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="public-priority">Priority</label>
                            <select id="public-priority" class="form-control" required>
                                <option value="low">Low - Not urgent</option>
                                <option value="medium" selected>Medium - Needs attention</option>
                                <option value="high">High - Urgent</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-warning btn-block">Submit Report</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="tenant-auth.js"></script>
    <script>
        // This script is separate from tenant-auth.js to handle public data
        document.addEventListener('DOMContentLoaded', () => {
            const db = firebase.firestore();
            const params = new URLSearchParams(window.location.search);
            const companyId = params.get('company');
            const announcementsList = document.getElementById('public-announcements-list');

            if (companyId) {
                if (announcementsList) {
                db.collection('users').doc(companyId).collection('announcements').orderBy('createdAt', 'desc').limit(5)
                    .onSnapshot(snapshot => {
                        let html = '';
                        if (snapshot.empty) {
                            announcementsList.innerHTML = '<div class="list-group-item"><p class="list-group-item-text">No announcements at this time.</p></div>';
                            return;
                        }
                        snapshot.forEach(doc => {
                            const announcement = doc.data();
                            html += `
                                <div class="list-group-item">
                                    <h4 class="list-group-item-heading">${announcement.title}</h4>
                                    <div class="list-group-item-text">${announcement.content}</div>
                                    <p class="text-muted" style="margin-top: 10px; font-size: 12px;">Posted on ${announcement.createdAt.toDate().toLocaleDateString()}</p>
                                </div>
                            `;
                        });
                        announcementsList.innerHTML = html;
                    }, err => {
                        console.error("Error fetching public announcements:", err);
                        announcementsList.innerHTML = '<div class="list-group-item"><p class="list-group-item-text text-danger">Could not load announcements.</p></div>';
                    });
                }

                // --- Public Maintenance Logic ---
                const propertySelect = document.getElementById('public-property');
                const maintenanceForm = document.getElementById('public-maintenance-form');

                // Load units
                db.collection('users').doc(companyId).collection('properties').orderBy('address').get().then(snapshot => {
                    let optionsHtml = '<option value="">Select your unit...</option>';
                    snapshot.forEach(doc => {
                        optionsHtml += `<option value="${doc.id}">${doc.data().address}</option>`;
                    });
                    propertySelect.innerHTML = optionsHtml;
                });

                // Handle submission
                maintenanceForm.addEventListener('submit', e => {
                    e.preventDefault();
                    const propertyId = propertySelect.value;
                    const propertyAddress = propertySelect.options[propertySelect.selectedIndex].text;
                    const issue = document.getElementById('public-issue').value;
                    const priority = document.getElementById('public-priority').value;

                    db.collection('users').doc(companyId).collection('maintenance').add({
                        propertyId,
                        propertyAddress,
                        issue: `(Public Report) ${issue}`,
                        priority,
                        status: 'open',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(() => {
                        alert('Thank you. Your maintenance request has been submitted successfully.');
                        maintenanceForm.reset();
                    }).catch(err => {
                        console.error("Error submitting public maintenance:", err);
                        alert('Error submitting request. Please try again.');
                    });
                });
            }
        });
    </script>

</body>
</html>
