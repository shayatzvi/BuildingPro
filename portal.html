<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenant Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">

    <div class="page-container">
        <nav class="top-nav">
            <div class="nav-left">
                <div class="nav-logo"><h2>Tenant Portal</h2></div>
            </div>
            <div class="nav-right">
                <div class="header-user"><span id="tenant-email"></span></div>
                <button id="tenant-logout-button" class="button-text">Logout</button>
            </div>
        </nav>

        <main class="main-content">
            <div class="content-area">
                <div class="master-view">
                    <div class="page-header">
                        <h1>Welcome, <span id="tenant-name"></span>!</h1>
                    </div>

                    <div class="dashboard-grid">
                        <div class="card">
                            <h4>My Residence</h4>
                            <p id="tenant-property-address" style="font-size: 1.2rem; font-weight: 500;"></p>
                        </div>
                        <div class="card">
                            <h4>Lease End Date</h4>
                            <p id="tenant-lease-end" style="font-size: 1.2rem; font-weight: 500;"></p>
                        </div>
                    </div>

                    <div class="card dashboard-list-card">
                        <h3>My Invoices</h3>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Amount</th>
                                    <th>Due Date</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="tenant-invoices-list"></tbody>
                        </table>
                        <div id="empty-tenant-invoices-state" class="empty-state" style="display: none;">
                            <span class="material-symbols-outlined">receipt</span>
                            <p>You have no invoices.</p>
                        </div>
                    </div>

                    <div class="card dashboard-list-card">
                        <h3>Submit a Maintenance Request</h3>
                        <form id="portal-maintenance-form">
                            <div class="input-field">
                                <label for="portal-issue-description">Issue Description</label>
                                <textarea id="portal-issue-description" rows="3" required placeholder="e.g., The kitchen sink is leaking under the cabinet."></textarea>
                            </div>
                            <div class="select-field">
                                <label for="portal-issue-priority">Priority</label>
                                <select id="portal-issue-priority" required>
                                    <option value="low">Low - Not urgent</option>
                                    <option value="medium">Medium - Needs attention soon</option>
                                    <option value="high">High - Urgent</option>
                                </select>
                            </div>
                            <button type="submit" class="button-primary">Submit Request</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="portal.js"></script>

</body>
</html>
