<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form - PropSys</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f5f5f5;
            padding-top: 30px;
            padding-bottom: 30px;
        }
        .form-container {
            max-width: 680px;
            padding: 30px;
            margin: auto;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="form-container" class="form-container">
            <div id="loading-state">
                <h2 class="text-center">Loading form...</h2>
            </div>
            <div id="form-content" style="display: none;">
                <h2 id="form-title"></h2>
                <p id="form-description"></p>
                <hr>
                <form id="public-form">
                    <div id="fields-wrapper"></div>
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
             <div id="success-message" class="alert alert-success" style="display: none;">
                <h4>Thank you!</h4>
                <p>Your submission has been received.</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const db = firebase.firestore();
            const params = new URLSearchParams(window.location.search);
            const formId = params.get('id');

            if (!formId) {
                document.getElementById('loading-state').innerHTML = '<h2 class="text-center text-danger">Error: Form ID is missing.</h2>';
                return;
            }

            const formContent = document.getElementById('form-content');
            const fieldsWrapper = document.getElementById('fields-wrapper');

            db.collection('forms').doc(formId).get().then(doc => {
                if (!doc.exists) {
                    document.getElementById('loading-state').innerHTML = '<h2 class="text-center text-danger">Error: Form not found.</h2>';
                    return;
                }

                const formData = doc.data();
                document.title = formData.title + " - PropSys";
                document.getElementById('form-title').textContent = formData.title;
                document.getElementById('form-description').textContent = formData.description;

                formData.fields.forEach(field => {
                    if (field.public) { // Only show fields marked as public
                        const requiredAttr = field.required ? 'required' : '';
                        const fieldHtml = `
                            <div class="form-group">
                                <label>${field.label}</label>
                                <input type="${field.type}" class="form-control" ${requiredAttr}>
                            </div>
                        `;
                        fieldsWrapper.insertAdjacentHTML('beforeend', fieldHtml);
                    }
                });

                document.getElementById('loading-state').style.display = 'none';
                formContent.style.display = 'block';
            });

            // Note: Submission logic for this public form is not yet implemented.
            document.getElementById('public-form').addEventListener('submit', e => {
                e.preventDefault();
                // Hide form and show success message
                formContent.style.display = 'none';
                document.getElementById('success-message').style.display = 'block';
            });
        });
    </script>
</body>
</html>
