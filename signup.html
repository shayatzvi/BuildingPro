<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PropSys</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .signup-form {
            max-width: 380px;
            padding: 15px;
            margin: auto;
        }
        .form-signup-heading {
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <form id="signup-form" class="signup-form">
            <h2 class="form-signup-heading">Create Account</h2>
            <div id="signup-error" class="alert alert-danger" style="display: none;"></div>
            <div class="form-group">
                <label for="signup-email" class="sr-only">Email address</label>
                <input type="email" id="signup-email" class="form-control" placeholder="Email address" required autofocus>
            </div>
            <div class="form-group">
                <label for="signup-password" class="sr-only">Password</label>
                <input type="password" id="signup-password" class="form-control" placeholder="Password" required>
            </div>
            <div class="form-group">
                <label for="signup-password-confirm" class="sr-only">Confirm Password</label>
                <input type="password" id="signup-password-confirm" class="form-control" placeholder="Confirm Password" required>
            </div>
            <button class="btn btn-lg btn-primary btn-block" type="submit">Sign up</button>
            <p class="text-center" style="margin-top: 20px;">
                Already have an account? <a href="login.html">Sign in</a>
            </p>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const passwordConfirm = document.getElementById('signup-password-confirm').value;
            const signupError = document.getElementById('signup-error');

            // Hide error on new submission
            signupError.style.display = 'none';

            if (password !== passwordConfirm) {
                signupError.textContent = "Passwords do not match.";
                signupError.style.display = 'block';
                return;
            }

            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Signed up successfully. Firebase automatically signs the user in.
                    console.log('User created:', userCredential.user);
                    // Redirect to the dashboard page
                    window.location.href = 'dashboard.html';
                })
                .catch((error) => {
                    signupError.textContent = error.message;
                    signupError.style.display = 'block';
                });
        });
    </script>
</body>
</html>
